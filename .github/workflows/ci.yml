name: ci

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env > /dev/null 2>&1; then
            echo "::error::.env must never be tracked in git."
            exit 1
          fi

      - name: Run repository secret scan
        run: python scripts/secret_guard.py --mode repo

  supply-chain:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install backend dependencies
        run: poetry install --no-interaction --with dev

      - name: Install supply-chain tooling
        run: poetry run pip install pip-audit==2.10.0 cyclonedx-bom==7.2.2

      - name: Run supply-chain gate
        run: poetry run python scripts/supply_chain_gate.py

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-security-artifacts
          path: .tmp/security/*.json
          if-no-files-found: warn

  lint:
    runs-on: ubuntu-latest
    needs: [secret-scan, supply-chain]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run lint checks
        run: poetry run ruff check app tests

  web-admin:
    runs-on: ubuntu-latest
    needs: [secret-scan, supply-chain]
    defaults:
      run:
        working-directory: web-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend build
        run: npm run build

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke e2e
        run: npm run test:smoke:e2e

  ops-config:
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      GRAFANA_ADMIN_USER: ci-grafana-admin
      GRAFANA_ADMIN_PASSWORD: ci-grafana-admin-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate ops config bundle (shared script)
        shell: pwsh
        run: ./scripts/validate_ops_configs.ps1

  test:
    runs-on: ubuntu-latest
    needs: [lint, ops-config, web-admin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run tests
        env:
          APP_ENV: development
        run: poetry run pytest -q

  migration:
    runs-on: ubuntu-latest
    needs: [lint, ops-config, web-admin]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: guitaronline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d guitaronline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run migrations
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/guitaronline
        run: poetry run alembic upgrade head

  integration:
    runs-on: ubuntu-latest
    needs: [migration]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: guitaronline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d guitaronline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Apply migrations
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/guitaronline
        run: poetry run alembic upgrade head

      - name: Start API server
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/guitaronline
          AUTH_RATE_LIMIT_TRUSTED_PROXY_IPS: 127.0.0.1,::1
          AUTH_REGISTER_ALLOWED_ROLES: student,teacher,admin
        run: |
          poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API healthcheck
        run: |
          attempts=0
          until curl -fsS http://localhost:8000/health > /dev/null; do
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge 45 ]; then
              echo "API failed to start in time"
              cat api.log
              exit 1
            fi
            sleep 2
          done
          echo "API is ready"

      - name: Run HTTP integration tests
        env:
          INTEGRATION_BASE_URL: http://localhost:8000/api/v1
          INTEGRATION_HEALTH_URL: http://localhost:8000/health
          INTEGRATION_DB_DSN: postgresql://postgres:postgres@localhost:5432/guitaronline
        run: poetry run pytest -q tests/test_booking_billing_integration.py

      - name: Dump API log on failure
        if: failure()
        run: cat api.log

      - name: Stop API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi
