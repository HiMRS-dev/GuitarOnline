name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      operation:
        description: "Manual operation: deploy live release or run test-contour deploy smoke only"
        required: true
        type: choice
        options:
          - deploy_live
          - test_smoke_only
        default: deploy_live
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA)"
        required: true
        default: "main"
      profile:
        description: "Compose runtime profile"
        required: true
        type: choice
        options:
          - standard
          - proxy
        default: standard
      run_backup:
        description: "Create pre-deploy DB backup"
        required: true
        type: boolean
        default: true
      run_smoke:
        description: "Run post-deploy smoke checks"
        required: true
        type: boolean
        default: true
      confirm:
        description: "Type DEPLOY for live deploy or TEST_SMOKE for test smoke"
        required: true

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'deploy_live' && github.event.inputs.confirm == 'DEPLOY') || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
      AUTO_DEPLOY_ENABLED: ${{ secrets.AUTO_DEPLOY_ENABLED }}
      OPERATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation || 'deploy_live' }}
      REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}
      PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'standard' }}
      RUN_BACKUP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_backup || 'true' }}
      RUN_SMOKE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_smoke || 'true' }}
      TRIGGER_SOURCE: ${{ github.event_name }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF_NAME }}

      - name: Evaluate auto-deploy guard
        id: auto_deploy_guard
        run: |
          set -euo pipefail
          if [ "${TRIGGER_SOURCE}" = "push" ] && [ "${AUTO_DEPLOY_ENABLED:-}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Auto deploy skipped: AUTO_DEPLOY_ENABLED is not true."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Auto deploy guard passed."

      - name: Print deployment context
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          echo "Trigger source: ${TRIGGER_SOURCE}"
          echo "Operation: ${OPERATION}"
          echo "Repository URL: ${REPO_URL}"
          echo "Deploy host: ${DEPLOY_HOST}"
          echo "Deploy path: ${DEPLOY_PATH}"
          echo "Requested ref: ${REF_NAME}"
          echo "Requested profile: ${PROFILE}"
          echo "Run backup: ${RUN_BACKUP}"
          echo "Run smoke: ${RUN_SMOKE}"
          echo "Bootstrap mode: auto (repo initialized if ${DEPLOY_PATH} has no .git)"

      - name: Setup Node.js for web-admin smoke gate
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web-admin dependencies
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        working-directory: web-admin
        run: npm install

      - name: Build web-admin bundle
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        working-directory: web-admin
        run: npm run build

      - name: Install Playwright browser (Chromium)
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        working-directory: web-admin
        run: npx playwright install --with-deps chromium

      - name: Run web-admin smoke e2e gate
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        working-directory: web-admin
        run: npm run test:smoke:e2e

      - name: Validate required secrets
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          required=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            DEPLOY_SSH_PRIVATE_KEY
            PROD_ENV_FILE_B64
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              exit 1
            fi
          done
          if [[ "${DEPLOY_PATH}" != /* ]]; then
            echo "::error::DEPLOY_PATH must be an absolute path. Got: ${DEPLOY_PATH}"
            exit 1
          fi
          if [[ "${PROFILE}" != "standard" && "${PROFILE}" != "proxy" ]]; then
            echo "::error::Unsupported profile input: ${PROFILE}"
            exit 1
          fi

      - name: Setup SSH key
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload production env file
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"

          mkdir -p .tmp
          trap 'rm -f .tmp/prod.env' EXIT
          printf '%s' "${PROD_ENV_FILE_B64}" | base64 -d > .tmp/prod.env

          ssh -p "${port}" "${remote}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "${port}" .tmp/prod.env "${remote}:${DEPLOY_PATH}/.env"
          ssh -p "${port}" "${remote}" "chmod 600 '${DEPLOY_PATH}/.env'"

      - name: Deploy, migrate, smoke, rollback on failure
        id: remote_deploy
        if: ${{ steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"
          mkdir -p .tmp/deploy-evidence

          ssh -p "${port}" "${remote}" "DEPLOY_PATH='${DEPLOY_PATH}' REF_NAME='${REF_NAME}' PROFILE='${PROFILE}' RUN_BACKUP='${RUN_BACKUP}' RUN_SMOKE='${RUN_SMOKE}' REPO_URL='${REPO_URL}' bash -s" < scripts/deploy_remote.sh | tee .tmp/deploy-evidence/deploy_remote.log

      - name: Build deploy evidence summary
        if: ${{ always() && steps.auto_deploy_guard.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/deploy-evidence
          log_file=".tmp/deploy-evidence/deploy_remote.log"
          live_ops_marker="missing"
          role_marker="missing"
          smoke_marker="missing"
          verified_marker="missing"
          if [ -f "${log_file}" ]; then
            if grep -Fq "Ops-only live smoke passed." "${log_file}"; then live_ops_marker="present"; fi
            if grep -Fq "Role-based release gate passed." "${log_file}"; then role_marker="present"; fi
            if grep -Fq "Smoke checks passed." "${log_file}"; then smoke_marker="present"; fi
            if grep -Fq "Smoke markers verified." "${log_file}"; then verified_marker="present"; fi
          fi
          {
            echo "generated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "trigger_source=${TRIGGER_SOURCE}"
            echo "requested_ref=${REF_NAME}"
            echo "profile=${PROFILE}"
            echo "run_backup=${RUN_BACKUP}"
            echo "run_smoke=${RUN_SMOKE}"
            echo "live_ops_marker=${live_ops_marker}"
            echo "role_gate_marker=${role_marker}"
            echo "smoke_passed_marker=${smoke_marker}"
            echo "smoke_verified_marker=${verified_marker}"
          } > .tmp/deploy-evidence/summary.txt

          run_smoke_normalized="$(printf '%s' "${RUN_SMOKE:-true}" | tr '[:upper:]' '[:lower:]')"
          if [ "${run_smoke_normalized}" = "true" ]; then
            if { [ "${live_ops_marker}" != "present" ] && [ "${role_marker}" != "present" ]; } || [ "${smoke_marker}" != "present" ] || [ "${verified_marker}" != "present" ]; then
              echo "::error::Deploy smoke markers are missing in deploy_remote.log. live_ops_marker=${live_ops_marker}, role_gate_marker=${role_marker}, smoke_passed_marker=${smoke_marker}, smoke_verified_marker=${verified_marker}"
              exit 1
            fi
          fi

      - name: Upload deploy evidence artifact
        if: ${{ always() && steps.auto_deploy_guard.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .tmp/deploy-evidence
          if-no-files-found: warn

  test_smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'test_smoke_only' && github.event.inputs.confirm == 'TEST_SMOKE' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      REF_NAME: ${{ github.event.inputs.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF_NAME }}

      - name: Print test-smoke context
        run: |
          set -euo pipefail
          echo "Operation: test_smoke_only"
          echo "Deploy host: ${DEPLOY_HOST}"
          echo "Deploy path: ${DEPLOY_PATH}"
          echo "Requested ref: ${REF_NAME}"

      - name: Validate required secrets
        run: |
          set -euo pipefail
          required=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            DEPLOY_SSH_PRIVATE_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              exit 1
            fi
          done
          if [[ "${DEPLOY_PATH}" != /* ]]; then
            echo "::error::DEPLOY_PATH must be an absolute path. Got: ${DEPLOY_PATH}"
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Run test-contour deploy smoke on target host
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"
          mkdir -p .tmp/test-deploy-smoke

          ssh -p "${port}" "${remote}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' REF_NAME='${REF_NAME}' bash -s" \
            < scripts/run_deploy_smoke_remote.sh | tee .tmp/test-deploy-smoke/deploy_smoke_remote.log

      - name: Upload test deploy-smoke artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-deploy-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: .tmp/test-deploy-smoke
          if-no-files-found: warn
