name: load-sanity

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to validate"
        required: true
        default: "main"
      target_slots:
        description: "Target slots for load sanity script (<=1000)"
        required: true
        default: "1000"
      confirm:
        description: "Type SANITY to confirm"
        required: true

jobs:
  load-sanity:
    if: ${{ github.event.inputs.confirm == 'SANITY' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      REF_NAME: ${{ github.event.inputs.ref }}
      TARGET_SLOTS: ${{ github.event.inputs.target_slots }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF_NAME }}

      - name: Validate required secrets and inputs
        run: |
          set -euo pipefail
          required=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            DEPLOY_SSH_PRIVATE_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              exit 1
            fi
          done
          if [[ "${DEPLOY_PATH}" != /* ]]; then
            echo "::error::DEPLOY_PATH must be absolute. Got: ${DEPLOY_PATH}"
            exit 1
          fi
          if ! [[ "${TARGET_SLOTS}" =~ ^[0-9]+$ ]]; then
            echo "::error::target_slots must be an integer. Got: ${TARGET_SLOTS}"
            exit 1
          fi
          if [ "${TARGET_SLOTS}" -lt 1 ] || [ "${TARGET_SLOTS}" -gt 1000 ]; then
            echo "::error::target_slots must be in range 1..1000. Got: ${TARGET_SLOTS}"
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Run load sanity on target host
        run: |
          set -euo pipefail
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"
          ssh -p "${port}" "${remote}" "TARGET_SLOTS='${TARGET_SLOTS}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          docker compose -f docker-compose.prod.yml exec -T \
            -e LOAD_SANITY_BASE_URL="http://localhost:8000" \
            -e LOAD_SANITY_TARGET_SLOTS="${TARGET_SLOTS}" \
            app python - < scripts/load_sanity.py
          REMOTE
