name: restore-rehearsal

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to use for remote restore rehearsal runner script"
        required: true
        default: "main"
      backup_file:
        description: "Optional backup file path on target host (relative to DEPLOY_PATH or absolute)"
        required: false
        default: ""
      confirm:
        description: "Type RESTORE to confirm"
        required: true
  schedule:
    - cron: "20 3 * * 1"

jobs:
  rehearsal:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.confirm == 'RESTORE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      REF_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || 'main' }}
      BACKUP_FILE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backup_file || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF_NAME }}

      - name: Print restore rehearsal context
        run: |
          set -euo pipefail
          echo "Deploy host: ${DEPLOY_HOST}"
          echo "Deploy path: ${DEPLOY_PATH}"
          echo "Ref for runner script: ${REF_NAME}"
          if [ -n "${BACKUP_FILE_INPUT}" ]; then
            echo "Backup override: ${BACKUP_FILE_INPUT}"
          else
            echo "Backup override: <latest scheduled daily backup>"
          fi

      - name: Validate required secrets and inputs
        run: |
          set -euo pipefail
          required=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            DEPLOY_SSH_PRIVATE_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              exit 1
            fi
          done
          if [[ "${DEPLOY_PATH}" != /* ]]; then
            echo "::error::DEPLOY_PATH must be an absolute path. Got: ${DEPLOY_PATH}"
            exit 1
          fi
          if [[ "${BACKUP_FILE_INPUT}" == *$'\n'* ]]; then
            echo "::error::backup_file must be a single-line path."
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Run restore rehearsal on target host
        id: run_rehearsal
        run: |
          set -euo pipefail
          mkdir -p .tmp
          log_file=".tmp/restore-rehearsal.log"
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"

          remote_cmd="$(printf 'DEPLOY_PATH=%q ' "${DEPLOY_PATH}")"
          if [ -n "${BACKUP_FILE_INPUT}" ]; then
            remote_cmd+=$(printf 'RESTORE_REHEARSAL_BACKUP_FILE=%q ' "${BACKUP_FILE_INPUT}")
          fi
          remote_cmd+="bash -s"

          ssh -p "${port}" "${remote}" "${remote_cmd}" < scripts/run_restore_rehearsal_remote.sh | tee "${log_file}"

          report_path="$(grep '^restore_rehearsal_report=' "${log_file}" | tail -n 1 | cut -d '=' -f2-)"
          if [ -z "${report_path}" ]; then
            echo "::error::Failed to parse restore report path from remote output."
            exit 1
          fi
          echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"

      - name: Download restore rehearsal report
        run: |
          set -euo pipefail
          mkdir -p .tmp
          remote="${DEPLOY_USER}@${DEPLOY_HOST}"
          port="${DEPLOY_PORT:-22}"
          report_path="${{ steps.run_rehearsal.outputs.report_path }}"
          scp -P "${port}" "${remote}:${report_path}" ".tmp/restore-rehearsal-report.json"

      - name: Print RPO/RTO summary
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".tmp/restore-rehearsal-report.json").read_text(encoding="utf-8"))
          print(f"RPO seconds: {report['rpo_seconds']}")
          print(f"RTO seconds: {report['rto_seconds']}")
          print(f"Backup source: {report['backup_file']}")
          print(f"Verification DB: {report['verification_db']}")
          PY

      - name: Upload restore rehearsal report artifact
        uses: actions/upload-artifact@v4
        with:
          name: restore-rehearsal-report-${{ github.run_id }}
          path: .tmp/restore-rehearsal-report.json
          if-no-files-found: error
