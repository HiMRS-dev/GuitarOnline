name: secret-rotation-dry-run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to validate"
        required: true
        default: "main"
      rotation_target:
        description: "Target key to rotate"
        required: true
        type: choice
        options:
          - auto
          - JWT_SECRET
          - SECRET_KEY
        default: auto
      confirm:
        description: "Type ROTATE to confirm"
        required: true

jobs:
  dry-run:
    if: ${{ github.event.inputs.confirm == 'ROTATE' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REF_NAME: ${{ github.event.inputs.ref }}
      ROTATION_TARGET: ${{ github.event.inputs.rotation_target }}
      PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF_NAME }}

      - name: Validate required secret and inputs
        run: |
          set -euo pipefail
          if [ -z "${PROD_ENV_FILE_B64:-}" ]; then
            echo "::error::Missing required repository secret PROD_ENV_FILE_B64"
            exit 1
          fi
          case "${ROTATION_TARGET}" in
            auto|JWT_SECRET|SECRET_KEY) ;;
            *)
              echo "::error::Unsupported rotation_target: ${ROTATION_TARGET}"
              exit 1
              ;;
          esac

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Decode production env bundle
        run: |
          set -euo pipefail
          mkdir -p .tmp/security
          printf '%s' "${PROD_ENV_FILE_B64}" | base64 -d > .tmp/security/prod.env
          chmod 600 .tmp/security/prod.env

      - name: Run secret rotation dry-run
        run: |
          set -euo pipefail
          poetry run python scripts/secret_rotation_dry_run.py \
            --env-file .tmp/security/prod.env \
            --rotation-target "${ROTATION_TARGET}" \
            --skip-github-check \
            --output-json .tmp/security/secret_rotation_dry_run_report.json \
            --output-md .tmp/security/secret_rotation_dry_run_report.md

      - name: Remove decoded env file
        if: always()
        run: rm -f .tmp/security/prod.env

      - name: Upload dry-run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-dry-run-report
          path: |
            .tmp/security/secret_rotation_dry_run_report.json
            .tmp/security/secret_rotation_dry_run_report.md
          if-no-files-found: error
