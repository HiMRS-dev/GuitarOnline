services:
  app:
    ports: []
    expose:
      - "8000"
    environment:
      AUTH_RATE_LIMIT_TRUSTED_PROXY_IPS: ${AUTH_RATE_LIMIT_TRUSTED_PROXY_IPS:-127.0.0.1,::1,172.16.0.0/12}

  prometheus:
    ports: []
    expose:
      - "9090"

  alertmanager:
    ports: []
    expose:
      - "9093"

  grafana:
    ports: []
    expose:
      - "3000"

  reverse-proxy:
    image: nginx:1.27-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${PROXY_TLS_CERTS_PATH:-./ops/nginx/certs}:/etc/nginx/certs:ro
    ports:
      - "${PROXY_PUBLIC_PORT:-8080}:80"
      - "${PROXY_TLS_PUBLIC_PORT:-8443}:443"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -q -O - https://127.0.0.1/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
